<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f0ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="资产追踪" />
    <title>资产追踪</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=top-spacing-v1" />
  </head>
  <body>
    <section class="auth-screen" id="authScreen" aria-label="手机号登录">
      <div class="auth-card">
        <div class="auth-brand">
          <span>资产追踪</span>
          <h1>手机号验证码登录</h1>
          <p>登录后将按账号独立保存流水、快照和计划数据。</p>
        </div>
        <form class="auth-form" id="authForm">
          <label>
            <span>手机号</span>
            <input id="phoneInput" inputmode="tel" maxlength="11" placeholder="请输入手机号" autocomplete="tel" />
          </label>
          <label>
            <span>验证码</span>
            <div class="code-row">
              <input id="codeInput" inputmode="numeric" maxlength="6" placeholder="6 位验证码" autocomplete="one-time-code" />
              <button id="sendCodeButton" type="button">获取验证码</button>
            </div>
          </label>
          <p class="auth-tip" id="authTip">原型阶段验证码会在本机模拟生成。</p>
          <button class="primary-button" type="submit">登录</button>
        </form>
      </div>
    </section>

    <main class="app-shell" aria-label="资产追踪 App 原型">
      <section class="topbar">
        <div>
          <h1 id="pageTitle">投入与收益总览</h1>
        </div>
        <button class="account-button" id="accountButton" type="button" aria-label="账号">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0" />
            <circle cx="12" cy="8" r="4" />
          </svg>
        </button>
      </section>

      <section class="view active" data-view="overview">
        <section class="period-filter" aria-label="周期选择">
          <div class="filter-block">
            <div id="yearOptions" class="chip-strip" aria-label="年份筛选"></div>
          </div>
          <div class="filter-block">
            <div id="monthOptions" class="chip-strip" aria-label="月份筛选"></div>
          </div>
        </section>

        <section class="hero-panel" aria-label="核心指标">
          <div class="hero-row">
            <div>
              <p class="muted" id="assetLabel">期末总资产</p>
              <strong id="totalAsset">¥0</strong>
            </div>
          </div>
          <div class="summary-grid">
            <div>
              <span id="inLabel">本月投入</span>
              <b id="periodIn">¥0</b>
            </div>
            <div>
              <span id="outLabel">本月取出</span>
              <b id="periodOut">¥0</b>
            </div>
            <div>
              <span id="profitLabel">本月盈亏</span>
              <b id="periodProfit">¥0</b>
            </div>
          </div>
        </section>

        <section class="chart-section" aria-label="投入计划进度">
          <div class="section-title">
            <h2>投入计划进度</h2>
            <span id="planStatus">目标 5 万</span>
          </div>
          <div class="segmented mini" role="tablist" aria-label="投入进度维度">
            <button type="button" class="active" data-plan-scope="total">总览</button>
            <button type="button" data-plan-scope="class">大类</button>
            <button type="button" data-plan-scope="type">资产类型</button>
          </div>
          <div class="progress-meter">
            <div id="planProgress"></div>
          </div>
          <div class="metric-row">
            <span>计划投入</span>
            <b id="plannedIn">¥0</b>
          </div>
          <div class="metric-row">
            <span>净投入</span>
            <b id="netIn">¥0</b>
          </div>
          <div id="planProgressList" class="progress-list"></div>
        </section>

        <section class="chart-section" aria-label="资产占比">
          <div class="section-title">
            <h2>资产占比</h2>
            <span id="allocationStatus">按投入</span>
          </div>
          <div class="allocation-layout">
            <div class="donut-wrap">
              <div class="donut" id="donutChart" role="button" tabindex="0" aria-label="点击查看资产小类占比"></div>
              <div class="allocation-popover hidden" id="allocationPopover"></div>
            </div>
            <div class="legend" id="allocationLegend"></div>
          </div>
        </section>

        <section class="activity-section" aria-label="分类明细">
          <div class="section-title">
            <h2>分类明细</h2>
            <span id="detailCount">0 项</span>
          </div>
          <div id="detailList" class="activity-list"></div>
        </section>
      </section>

      <section class="view" data-view="record">
        <section class="record-hero" aria-label="新增记录">
          <div class="record-actions">
            <button class="action-button flow-action" id="openFlowButton" type="button">新增流水</button>
            <button class="action-button snapshot-action" id="openSnapshotButton" type="button">新增快照</button>
          </div>
        </section>

        <section class="activity-section" aria-label="明细信息">
          <div class="section-title">
            <h2>明细信息</h2>
            <span id="recordCount">0 条</span>
          </div>
          <div class="segmented record-tabs" role="tablist" aria-label="明细类型">
            <button type="button" class="active" data-record-view="flow">流水明细</button>
            <button type="button" data-record-view="snapshot">资产快照</button>
          </div>
          <div id="recordMonthOptions" class="chip-strip record-month-strip" aria-label="明细月份筛选"></div>
          <div id="recordList" class="activity-list"></div>
          <div class="pagination" id="recordPagination" aria-label="明细分页"></div>
        </section>
      </section>

      <section class="modal-layer hidden" id="flowModal" aria-label="流水弹窗">
        <div class="modal-panel">
          <div class="modal-head">
            <h2 id="flowModalTitle">新增流水</h2>
            <button class="close-button" data-close-modal="flow" type="button" aria-label="关闭">×</button>
          </div>

          <form id="flowForm" class="record-form" data-edit-index="">
            <label>
              <span>日期</span>
              <input id="flowDate" type="date" value="2026-07-01" />
            </label>
            <div class="field-row">
              <label>
                <span>平台</span>
                <select id="flowPlatform"></select>
              </label>
              <label>
                <span>操作</span>
                <select id="flowAction">
                  <option>投入</option>
                  <option>取出</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label>
                <span>大类</span>
                <select id="flowClass"></select>
              </label>
              <label>
                <span>资产类型</span>
                <select id="flowAsset"></select>
              </label>
            </div>
            <label>
              <span>标的名称</span>
              <input id="flowTarget" placeholder="例如 易方达标普500" autocomplete="off" />
            </label>
            <div class="field-row">
              <label>
                <span>金额</span>
                <input id="flowAmount" inputmode="decimal" placeholder="例如 5000" autocomplete="off" />
              </label>
            </div>
            <label>
              <span>备注</span>
              <input id="flowNote" placeholder="月度新增资金、定投、再平衡等" autocomplete="off" />
            </label>
            <button class="primary-button" type="submit">保存流水</button>
          </form>
        </div>
      </section>

      <section class="modal-layer hidden" id="snapshotModal" aria-label="快照弹窗">
        <div class="modal-panel">
          <div class="modal-head">
            <h2 id="snapshotModalTitle">新增快照</h2>
            <button class="close-button" data-close-modal="snapshot" type="button" aria-label="关闭">×</button>
          </div>

          <form id="snapshotForm" class="record-form" data-edit-index="">
            <label>
              <span>月份</span>
              <input id="snapshotMonth" type="month" value="2026-07" />
            </label>
            <div class="field-row">
              <label>
                <span>大类</span>
                <select id="snapshotClass"></select>
              </label>
              <label>
                <span>资产类型</span>
                <select id="snapshotAsset"></select>
              </label>
            </div>
            <div class="field-row">
              <label>
                <span>期初市值</span>
                <input id="snapshotStart" inputmode="decimal" placeholder="例如 100000" autocomplete="off" />
              </label>
              <label>
                <span>期末市值</span>
                <input id="snapshotEnd" inputmode="decimal" placeholder="例如 150000" autocomplete="off" />
              </label>
            </div>
            <label>
              <span>备注</span>
              <input id="snapshotNote" placeholder="补充估值、异常波动等" autocomplete="off" />
            </label>
            <button class="primary-button" type="submit">保存快照</button>
          </form>
        </div>
      </section>

      <section class="view" data-view="plan">
        <section class="chart-section plan-card" data-plan-section="monthly">
          <div class="section-title">
            <h2>月度投入计划</h2>
            <div class="plan-actions" id="monthlyPlanActions">
              <button class="icon-edit-button" type="button" data-plan-edit="monthly">编辑</button>
            </div>
          </div>
          <div id="monthlyPlanSummary" class="plan-summary-list"></div>
          <div class="plan-edit-panel hidden" id="monthlyPlanEditor">
            <label class="plan-input-row">
              <span>新增月份默认金额</span>
              <input id="defaultPlanInput" inputmode="decimal" autocomplete="off" />
            </label>
            <div class="section-subtitle">按月份覆盖</div>
          </div>
          <div id="monthlyPlanList" class="monthly-plan-list"></div>
        </section>
        <section class="chart-section plan-card" data-plan-section="targets">
          <div class="section-title">
            <h2>目标配置</h2>
            <div class="plan-actions" id="targetPlanActions">
              <button class="icon-edit-button" type="button" data-plan-edit="targets">编辑</button>
            </div>
          </div>
          <div id="targetList" class="target-list"></div>
        </section>
      </section>

      <section class="view" data-view="mine">
        <section class="hero-panel account-panel" aria-label="我的账号">
          <div class="account-avatar-large">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="8" r="4" />
            </svg>
          </div>
          <div>
            <p class="muted">当前账号</p>
            <strong id="accountPhoneLabel">未登录</strong>
          </div>
        </section>

        <section class="activity-section" aria-label="账号数据">
          <div class="section-title">
            <h2>数据概览</h2>
          </div>
          <div class="mine-grid">
            <div>
              <span>流水</span>
              <b id="mineFlowCount">0 条</b>
            </div>
            <div>
              <span>快照</span>
              <b id="mineSnapshotCount">0 条</b>
            </div>
            <div>
              <span>目标小类</span>
              <b id="mineTargetCount">0 个</b>
            </div>
          </div>
        </section>

        <section class="activity-section" aria-label="账号操作">
          <button class="mine-logout-button" id="logoutButton" type="button">退出登录</button>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <button type="button" class="active" data-nav="overview">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13h6V4H4v9Z" /><path d="M14 20h6V4h-6v16Z" /><path d="M4 20h6v-3H4v3Z" /></svg>
        <span>总览</span>
      </button>
      <button type="button" data-nav="record">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10" /><path d="M7 9h10" /><path d="M7 14h6" /><path d="M5 3h14v18H5V3Z" /></svg>
        <span>记录</span>
      </button>
      <button type="button" data-nav="plan">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5" /><path d="M4 19h16" /><path d="m7 15 4-4 3 3 5-7" /></svg>
        <span>计划</span>
      </button>
      <button type="button" data-nav="mine">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0" /><circle cx="12" cy="8" r="4" /></svg>
        <span>我的</span>
      </button>
    </nav>

    <script src="app.js?v=top-spacing-v1"></script>
  </body>
</html>
